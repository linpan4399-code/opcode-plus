name: Build macOS

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    name: Build macOS ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-13  # Intel
            target: x86_64-apple-darwin
            arch: x86_64
          - os: macos-14  # Apple Silicon
            target: aarch64-apple-darwin
            arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build native (unsigned)
        env:
          CI: true
        run: bun run tauri build --target ${{ matrix.target }}

      - name: Upload architecture-specific artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/opcodePlus.app
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          retention-days: 1

  universal:
    name: Create Universal Binary (unsigned)
    needs: [build]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts from current workflow
        uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Artifact structure:"
          find artifacts -type f -name "*.app" -o -name "*.dmg" | head -20
          echo ""
          echo "Full directory structure:"
          ls -la artifacts/ || true
          ls -la artifacts/macos-aarch64/ || echo "macos-aarch64 directory not found"
          ls -la artifacts/macos-x86_64/ || echo "macos-x86_64 directory not found"

      - name: Create universal app
        run: |
          mkdir -p dmg_temp

          if [ -f "artifacts/macos-aarch64.zip" ]; then
            unzip -q artifacts/macos-aarch64.zip -d artifacts/macos-aarch64/
          fi
          if [ -f "artifacts/macos-x86_64.zip" ]; then
            unzip -q artifacts/macos-x86_64.zip -d artifacts/macos-x86_64/
          fi

          AARCH64_APP=$(find artifacts/macos-aarch64 -name "opcodePlus.app" -type d | head -1)
          X86_64_APP=$(find artifacts/macos-x86_64 -name "opcodePlus.app" -type d | head -1)

          if [ -z "$AARCH64_APP" ] || [ -z "$X86_64_APP" ]; then
            echo "Could not find app bundles"
            echo "AARCH64_APP: $AARCH64_APP"
            echo "X86_64_APP: $X86_64_APP"
            exit 1
          fi

          echo "Found app bundles:"
          echo "  ARM64: $AARCH64_APP"
          echo "  x86_64: $X86_64_APP"

          cp -R "$AARCH64_APP" dmg_temp/

          lipo -create -output dmg_temp/opcodePlus.app/Contents/MacOS/opcode_plus \
            "$AARCH64_APP/Contents/MacOS/opcode_plus" \
            "$X86_64_APP/Contents/MacOS/opcode_plus"

          chmod +x dmg_temp/opcodePlus.app/Contents/MacOS/opcode_plus

          echo "Universal binary created:"
          lipo -info dmg_temp/opcodePlus.app/Contents/MacOS/opcode_plus

      - name: Ad-hoc sign (so app can launch after quarantine removal)
        run: |
          # Ad-hoc signature lets Gatekeeper verify integrity locally; no Apple Developer ID required.
          codesign --force --deep --sign - dmg_temp/opcodePlus.app
          codesign --verify --deep --strict dmg_temp/opcodePlus.app || true

      - name: Create DMG
        run: |
          hdiutil create -volname "opcodePlus Installer" \
            -srcfolder dmg_temp \
            -ov -format UDZO opcodePlus.dmg

      - name: Create artifacts directory
        run: |
          mkdir -p dist/macos-universal
          cp opcodePlus.dmg dist/macos-universal/

          ditto -c -k --sequesterRsrc --keepParent \
            dmg_temp/opcodePlus.app dist/macos-universal/opcodePlus.app.zip

          shasum -a 256 dist/macos-universal/* > dist/macos-universal/checksums.txt

          echo "=== Final artifacts ==="
          ls -la dist/macos-universal/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: dist/macos-universal/*

      - name: Cleanup
        if: always()
        run: rm -rf dmg_temp artifacts
