name: Build macOS

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    name: Build macOS Universal (unsigned)
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: universal

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build Tauri universal bundle (unsigned)
        env:
          CI: true
        run: bun run tauri build --target universal-apple-darwin

      - name: Locate app bundle
        id: locate
        run: |
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/opcodePlus.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found at expected path. Searching..."
            APP_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle -type d -name "opcodePlus.app" | head -1)
          fi
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "App bundle still not found"
            find src-tauri/target -type d -name "*.app" || true
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found app bundle at: $APP_PATH"
          echo "Architectures in main binary:"
          lipo -info "$APP_PATH/Contents/MacOS/opcode_plus" || true

      - name: Ad-hoc sign the app bundle
        run: |
          codesign --force --deep --sign - "${{ steps.locate.outputs.app_path }}"
          codesign --verify --deep --strict "${{ steps.locate.outputs.app_path }}" || true

      - name: Recreate DMG after ad-hoc signing
        run: |
          mkdir -p dmg_stage
          cp -R "${{ steps.locate.outputs.app_path }}" dmg_stage/
          ln -s /Applications dmg_stage/Applications
          hdiutil create -volname "opcodePlus Installer" \
            -srcfolder dmg_stage \
            -ov -format UDZO opcodePlus.dmg

      - name: Collect artifacts
        run: |
          mkdir -p dist/macos-universal
          cp opcodePlus.dmg dist/macos-universal/

          ditto -c -k --sequesterRsrc --keepParent \
            "${{ steps.locate.outputs.app_path }}" \
            dist/macos-universal/opcodePlus.app.zip

          shasum -a 256 dist/macos-universal/* > dist/macos-universal/checksums.txt

          echo "=== Final artifacts ==="
          ls -la dist/macos-universal/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: dist/macos-universal/*
