name: Build Windows

on:
  workflow_call:
    secrets:
      WINDOWS_CERTIFICATE:
        required: false
      WINDOWS_CERTIFICATE_PASSWORD:
        required: false
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    name: Build Windows x86_64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build Tauri app
        run: bun run tauri build --target x86_64-pc-windows-msvc
        env:
          CI: true

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows-x86_64 | Out-Null
          Get-ChildItem -Path src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis -Filter *.exe -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName dist\windows-x86_64\ }

          Push-Location dist\windows-x86_64
          $files = @(Get-ChildItem -File | Where-Object { $_.Name -ne 'checksums.txt' })
          $lines = foreach ($f in $files) {
            $hash = (Get-FileHash -LiteralPath $f.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($f.Name)"
          }
          Set-Content -Path checksums.txt -Value $lines -Encoding ascii
          Pop-Location

          Write-Host "Artifacts:"
          Get-ChildItem dist\windows-x86_64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: dist/windows-x86_64/*
